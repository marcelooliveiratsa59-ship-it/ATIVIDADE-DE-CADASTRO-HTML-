<html>
<head>
<title>Ficha de Inscrição</title>
</head>

<body>

<h2 align="center">Ficha de Inscrição</h2>

<form>

<table border="1" align="center" cellpadding="5">

<tr>
<td>Nome do candidato:</td>
<td colspan="4"><input type="text" size="60"></td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="4"><input type="text" size="60"></td>
</tr>

<tr>
<td>CEP:</td>
<td><input type="text"></td>

<td>Cidade:</td>
<td>
<select>
<option>-- Cidade --</option>
<option>Rio de Janeiro</option>
<option>Goiânia</option>
<option>Brasília</option>
</select>
</td>

<td>
<select>
<option>-- UF --</option>
<option>RJ</option>
<option>GO</option>
<option>DF</option>
</select>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td><input type="text"></td>
<td><input type="text"></td>
<td colspan="2"><input type="text"></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text"></td>

<td>CPF:</td>
<td><input type="text"></td>

<td>
Sexo:
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select>
<option>-- Selecione --</option>
<option>Ensino Fundamental</option>
<option>Ensino Médio</option>
<option>Ensino Superior</option>
</select>
</td>

<td>Email:</td>
<td colspan="2"><input type="email"></td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select>
<option>-- Selecione --</option>
<option>Sistemas</option>
<option>Direito</option>
<option>Administração</option>
</select>
</td>

<td>Senha de acompanhamento:</td>
<td colspan="2"><input type="password"></td>
</tr>

<tr>
<td colspan="5" align="center">
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
